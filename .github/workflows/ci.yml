name: ci

on:
  push:
    branches:
      - 'master'
      - 'main'
      - 'next'
    tags:
      - 'v*'
    paths-ignore:
      - '.codecov.yml'
      - '.editorconfig'
      - '.gitattributes'
      - '.gitignore'
      - '.gitmodules'
      - '.lintstagedrc.js'
      - '.prettierignore'
      - '.prettierrc'
      - 'LICENSE'
      - 'nukeeper.settings.json'
      - 'omnisharp.json'
      - 'package-lock.json'
      - 'package.json'
      - 'Readme.md'
      - '.github/dependabot.yml'
      - '.github/labels.yml'
      - '.github/release.yml'
      - '.github/renovate.json'
  pull_request:
    branches:
      - 'master'
      - 'main'
      - 'next'
    paths-ignore:
      - '.codecov.yml'
      - '.editorconfig'
      - '.gitattributes'
      - '.gitignore'
      - '.gitmodules'
      - '.lintstagedrc.js'
      - '.prettierignore'
      - '.prettierrc'
      - 'LICENSE'
      - 'nukeeper.settings.json'
      - 'omnisharp.json'
      - 'package-lock.json'
      - 'package.json'
      - 'Readme.md'
      - '.github/dependabot.yml'
      - '.github/labels.yml'
      - '.github/release.yml'
      - '.github/renovate.json'

jobs:
  build:
    env:
      NUGET_PACKAGES: '${{ github.workspace }}/.nuget/packages'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          clean: 'false'
          fetch-depth: '0'
      - name: Restore NuGet Cache
        id: restore-nuget-cache
        uses: actions/cache/restore@v5
        with:
          path: '${{ github.workspace }}/.nuget/packages'
          key: "${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}-${{ hashFiles('**/dotnet-tools.json') }}"
      - name: 🔨 Use .NET 8.0 SDK
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '8.0.x'
      - name: 🔨 Use .NET 9.0 SDK
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '9.0.x'
      - name: 🔨 Use .NET 10.0 SDK
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '10.0.x'
      - name: 🎁 dotnet tool restore
        run: |
          dotnet tool restore
      - name: 🎁 Restore
        id: restore
        run: |
          dotnet nuke Restore --skip
      - name: Update NuGet Cache
        if: always() && steps.restore-nuget-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          key: "${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}-${{ hashFiles('**/dotnet-tools.json') }}"
          path: '${{ github.workspace }}/.nuget/packages'
      - name: ⚙ Build
        id: build
        run: |
          dotnet nuke Build --skip
      - name: 🚦 Test
        id: test
        run: |
          dotnet nuke Test TriggerCodeCoverageReports GenerateCodeCoverageReportCobertura GenerateCodeCoverageBadges GenerateCodeCoverageSummary GenerateCodeCoverageReport --skip
      - name: 📦 Pack
        id: pack
        run: |
          dotnet nuke Pack --skip
      - name: Npm install
        working-directory: vscode-testextension
        run: |
          npm ci
      - name: 🚦 Vscode extension tests
        uses: coactions/setup-xvfb@v1
        with:
          run: 'npm run test'
          working-directory: 'vscode-testextension'
      - name: 🏺 Publish coverage data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: 'coverage-${{ matrix.os }}'
          path: 'coverage/'
      - name: 🐿 Publish Coverage
        if: (github.event_name != 'pull_request' && github.event_name != 'pull_request_target') || ((github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.user.login != 'renovate[bot]' && github.event.pull_request.user.login != 'dependabot[bot]')
        uses: codecov/codecov-action@v6.0.0
        with:
          name: 'actions-${{ matrix.os }}'
      - name: 🏺 Publish logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: 'logs-${{ matrix.os }}'
          path: 'artifacts/logs/'
      - name: 🏺 Publish test data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: 'test data-${{ matrix.os }}'
          path: 'artifacts/test/'
      - name: 🏺 Publish NuGet Packages
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: 'nuget-${{ matrix.os }}'
          path: 'artifacts/nuget/'
      - name: 🏺 Publish Documentation
        uses: actions/upload-artifact@v7
        with:
          name: 'docs-${{ matrix.os }}'
          path: 'artifacts/docs/'
  Merge:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@v7
        with:
          name: nuget
          pattern: nuget-*
  Publish:
    needs: Merge
    uses: RocketSurgeonsGuild/actions/.github/workflows/publish-nuget.yml@v0.3.15
    secrets:
      RSG_NUGET_API_KEY: '${{ secrets.RSG_NUGET_API_KEY }}'
      RSG_AZURE_DEVOPS: '${{ secrets.RSG_AZURE_DEVOPS }}'
